<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Testing PoC</title>
  <style>
    body { font-family: ui-monospace, monospace; background: #111; color: #888; padding: 1.5rem; max-width: 720px; margin: 0 auto; }
    code { color: #0f0; }
  </style>
</head>
<body>
  <p id="m">Redirecting…</p>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('t') || p.get('token') || p.get('iframe_token');
      if (t === null || t === '') {
        document.getElementById('m').innerHTML =
          'Add <code>?t=</code> (or <code>token=</code>) with the value. Example: <code>?t=DEMO</code>';
        return;
      }
      var u = 'https://api.monica.im/api/user/login_token?token=' + encodeURIComponent(t);
      /* Top-level navigation = same Set-Cookie as opening that URL in the bar (not iframe). */
      location.replace(u);
    })();
  </script>
  <noscript>
    <p>Enable JavaScript, or open directly:<br>
    <code>https://api.monica.im/api/user/login_token?token=…</code></p>
  </noscript>
</body>
</html>
