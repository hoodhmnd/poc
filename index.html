<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; color: #555; font-family: system-ui, sans-serif; font-size: 12px;
    }
    button {
      background: #141414; color: #666; border: 1px solid #222; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    button:hover { background: #1a1a1a; color: #888; }
    #hint { max-width: 18rem; text-align: center; line-height: 1.4; font-size: 11px; }
    code { color: #3a7; font-size: 10px; }
    a { color: #6af; }
  </style>
</head>
<body>
  <div id="wrap">
    <p id="hint"></p>
    <button id="go" type="button" hidden>Continue</button>
    <p id="reliable" hidden style="margin-top:0.75rem;"></p>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('t') || p.get('token') || p.get('iframe_token');
      var hint = document.getElementById('hint');
      var btn = document.getElementById('go');

      if (t === null || t === '') {
        hint.innerHTML =
          'Add <code>?t=…</code> · <code>&reliable=1</code> mismo pestaña (sin popup) · <code>&visible=1</code> popup grande';
        return;
      }

      var api = 'https://api.monica.im/api/user/login_token?token=' + encodeURIComponent(t);
      var app = 'https://monica.im';

      /* Una sola navegación a login_token como pegar URL; sin auto-ir a monica (evita doble sesión). */
      if (p.get('reliable') === '1') {
        var rel = document.getElementById('reliable');
        rel.hidden = false;
        rel.innerHTML =
          'Luego abrí <a href="' + app + '" rel="noopener">monica.im</a> en este perfil.';
        hint.textContent = '→ API…';
        location.replace(api);
        return;
      }

      function offScreenXY() {
        var o = {
          x: screen.availLeft + screen.availWidth + 400,
          y: screen.availTop + screen.availHeight + 400
        };
        return o;
      }

      var done = false;

      function kick(w) {
        if (!w) return false;
        done = true;
        hint.textContent = '…';
        btn.hidden = true;

        var once = false;
        function gotoApp() {
          if (once) return;
          once = true;
          location.replace(app);
        }

        /*
         * 1) load del popup → cookie aplicada (igual que abrir login_token solo).
         * 2) Un segundo breve (~700ms) suficiente antes de mover la pestaña principal.
         * 3) Cerramos el popup antes de ir a monica: dos ventanas vivas pueden hacer que Monica
         *    trate sesión/conexión (“dispositivo desconectado”) en algunos backends.
         */
        var fb = setTimeout(function () {
          try {
            w.close();
          } catch (e2) {}
          setTimeout(gotoApp, 300);
        }, 45000);

        try {
          w.addEventListener('load', function onLd() {
            w.removeEventListener('load', onLd);
            clearTimeout(fb);
            setTimeout(function () {
              try {
                w.close();
              } catch (e0) {}
              /* Pequeño margen tras cerrar, luego mismo patrón que antes (sin 2–3s extra). */
              setTimeout(gotoApp, 350);
            }, 720);
          });
        } catch (eLoad) {}

        return true;
      }

      /** Solo posición fuera de pantalla + un blur/recuperación foco. Sin bucles absurdos. */
      function tuckPopup(w, hidden) {
        if (!hidden || !w) return;
        try {
          w.resizeTo(1, 1);
          var o = offScreenXY();
          w.moveTo(o.x, o.y);
        } catch (e) {}
        try {
          w.blur();
          window.focus();
        } catch (e3) {}
      }

      function tryPopup() {
        var debugVisible = p.get('visible') === '1';
        var o = offScreenXY();
        var feats = debugVisible
          ? ['width=480', 'height=360', 'scrollbars=yes', 'resizable=yes'].join(',')
          : [
              'width=1',
              'height=1',
              'left=' + o.x,
              'top=' + o.y,
              'menubar=no',
              'toolbar=no',
              'location=no',
              'status=no',
              'scrollbars=no',
              'resizable=no'
            ].join(',');

        var w = window.open(api, '_blank', feats);
        if (w && !debugVisible) tuckPopup(w, true);
        return kick(w);
      }

      hint.textContent = '…';
      if (!tryPopup()) {
        hint.textContent = 'Tap';
        btn.hidden = false;
        btn.addEventListener('click', function () {
          if (done) return;
          if (!tryPopup()) hint.innerHTML = 'Blocked';
        });
      }
    })();
  </script>
</body>
</html>
