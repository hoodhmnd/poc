<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; color: #555; font-family: system-ui, sans-serif; font-size: 12px;
    }
    button {
      background: #141414; color: #666; border: 1px solid #222; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    button:hover { background: #1a1a1a; color: #888; }
    #hint { max-width: 16rem; text-align: center; line-height: 1.4; font-size: 11px; }
    code { color: #3a7; font-size: 10px; }
  </style>
</head>
<body>
  <div id="wrap">
    <p id="hint"></p>
    <button id="go" type="button" hidden>Continue</button>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('t') || p.get('token') || p.get('iframe_token');
      var hint = document.getElementById('hint');
      var btn = document.getElementById('go');

      if (t === null || t === '') {
        hint.innerHTML = 'Add <code>?t=…</code>';
        return;
      }

      var api = 'https://api.monica.im/api/user/login_token?token=' + encodeURIComponent(t);
      var app = 'https://monica.im';
      var done = false;

      function kick(w) {
        if (!w) return false;
        done = true;
        hint.textContent = '…';
        btn.hidden = true;
        setTimeout(function () {
          location.replace(app);
        }, 380);
        return true;
      }

      function tryPopup() {
        var feats = [
          'width=1', 'height=1',
          'left=' + (screen.availLeft + screen.availWidth + 16000),
          'top=' + (screen.availTop + screen.availHeight + 16000),
          'menubar=no', 'toolbar=no', 'location=no', 'status=no',
          'scrollbars=no', 'resizable=no'
        ].join(',');
        var w = window.open(api, '_blank', feats);
        if (w) {
          try {
            w.resizeTo(1, 1);
            w.moveTo(-4096, -4096);
          } catch (e1) {}
        }
        return kick(w);
      }

      /* Often blocked without a tap — fallback button below */
      if (!tryPopup()) {
        hint.textContent = 'Tap';
        btn.hidden = false;
        btn.addEventListener('click', function () {
          if (done) return;
          if (!tryPopup())
            hint.innerHTML = 'Blocked';
        });
      }
    })();
  </script>
</body>
</html>
