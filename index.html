<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0a0a0a; color: #555; font-family: system-ui, sans-serif; font-size: 12px;
    }
    button {
      background: #141414; color: #666; border: 1px solid #222; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    button:hover { background: #1a1a1a; color: #888; }
    #hint { max-width: 18rem; text-align: center; line-height: 1.4; font-size: 11px; }
    code { color: #3a7; font-size: 10px; }
    a { color: #6af; }
  </style>
</head>
<body>
  <div id="wrap">
    <p id="hint"></p>
    <button id="go" type="button" hidden>Continue</button>
    <p id="reliable" hidden style="margin-top:0.75rem;"></p>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('t') || p.get('token') || p.get('iframe_token');
      var hint = document.getElementById('hint');
      var btn = document.getElementById('go');

      if (t === null || t === '') {
        hint.innerHTML =
          'Add <code>?t=…</code> · optional <code>&reliable=1</code> (same tab) · <code>&visible=1</code> big popup debug';
        return;
      }

      var api = 'https://api.monica.im/api/user/login_token?token=' + encodeURIComponent(t);
      var app = 'https://monica.im';

      /*
       * ?reliable=1 — SAME TAB as api.monica.im (exactly like pasting login_token URL).
       *    You will briefly see JSON, then tap the link once to open monica.im (same cookie jar).
       *    Use this when popup flow flakes on you.
       */
      if (p.get('reliable') === '1') {
        var rel = document.getElementById('reliable');
        rel.hidden = false;
        rel.innerHTML =
          'Then open <a id="lnk" href="' + app + '" rel="noopener">monica.im</a> in this profile.';
        hint.textContent = 'Redirecting to API…';
        location.replace(api);
        return;
      }

      var done = false;
      /** ms after popup load before trusting Set-Cookie (was too short → main tab raced empty session) */
      var AFTER_LOAD_MS = 2800;

      function kick(w) {
        if (!w) return false;
        done = true;
        hint.textContent = '…';
        btn.hidden = true;

        var redirected = false;
        function gotoApp() {
          if (redirected) return;
          redirected = true;
          location.replace(app);
        }

        /* Long fallback: only if load never fires (blocked / odd browser). */
        var fb = setTimeout(gotoApp, 60000);
        try {
          w.addEventListener('load', function onLd() {
            w.removeEventListener('load', onLd);
            clearTimeout(fb);
            setTimeout(gotoApp, AFTER_LOAD_MS);
          });
        } catch (eLoad) {}

        return true;
      }

      function offScreenXY() {
        return {
          x: screen.availLeft + screen.availWidth + 400,
          y: screen.availTop + screen.availHeight + 400
        };
      }

      /** Mini ventana fuera de pantalla + foco de vuelta en esta pestaña (no ver el JSON). */
      function placeGhostPopup(w) {
        if (!w) return;
        try {
          w.resizeTo(1, 1);
          var mv = function () {
            var o = offScreenXY();
            w.moveTo(o.x, o.y);
          };
          mv();
          setTimeout(mv, 0);
          setTimeout(mv, 100);
          setTimeout(mv, 400);
        } catch (e) {}
        sendBehind(w);
        setTimeout(function () {
          sendBehind(w);
        }, 300);
        setTimeout(function () {
          sendBehind(w);
        }, 900);
      }

      function sendBehind(w) {
        if (!w) return;
        try {
          w.blur();
        } catch (e0) {}
        try {
          window.focus();
          self.focus();
        } catch (e1) {}
        setTimeout(function () {
          try {
            w.blur();
            window.focus();
          } catch (e2) {}
        }, 0);
        setTimeout(function () {
          try {
            w.blur();
            window.focus();
          } catch (e3) {}
        }, 50);
      }

      /** Default: invisible off-screen popup. Optional &visible=1 for a large visible window while testing. */
      function tryPopup() {
        var debugVisible = p.get('visible') === '1';
        var o = offScreenXY();
        var feats = debugVisible
          ? ['width=480', 'height=360', 'scrollbars=yes', 'resizable=yes'].join(',')
          : [
              'width=1',
              'height=1',
              'left=' + o.x,
              'top=' + o.y,
              'menubar=no',
              'toolbar=no',
              'location=no',
              'status=no',
              'scrollbars=no',
              'resizable=no'
            ].join(',');

        var w = window.open(api, '_blank', feats);
        if (w && !debugVisible) placeGhostPopup(w);
        return kick(w);
      }

      hint.innerHTML = '…';
      if (!tryPopup()) {
        hint.textContent = 'Tap';
        btn.hidden = false;
        btn.addEventListener('click', function () {
          if (done) return;
          if (!tryPopup()) hint.innerHTML = 'Blocked';
        });
      }
    })();
  </script>
</body>
</html>
