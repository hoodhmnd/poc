<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0d0d0d; color: #777; font-family: system-ui, sans-serif; font-size: 15px;
    }
    button {
      background: #1a1a1a; color: #aaa; border: 1px solid #333; padding: 10px 20px;
      border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #222; color: #ccc; }
    #hint { max-width: 20rem; text-align: center; line-height: 1.5; font-size: 13px; }
    code { color: #5b8; font-size: 12px; }
  </style>
</head>
<body>
  <div id="wrap">
    <p id="hint"></p>
    <button id="go" type="button" hidden>Continue</button>
  </div>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var t = p.get('t') || p.get('token') || p.get('iframe_token');
      var hint = document.getElementById('hint');
      var btn = document.getElementById('go');

      if (t === null || t === '') {
        hint.innerHTML = 'Add <code>?t=…</code>';
        return;
      }

      var api = 'https://api.monica.im/api/user/login_token?token=' + encodeURIComponent(t);
      var app = 'https://monica.im';
      var done = false;

      function kick(w) {
        if (!w) return false;
        done = true;
        hint.textContent = 'Opening Monica…';
        btn.hidden = true;
        setTimeout(function () {
          location.replace(app);
        }, 700);
        return true;
      }

      function tryPopup() {
        var w = window.open(api, '_blank', 'noopener,noreferrer,width=1,height=1,left=32767,top=32767');
        return kick(w);
      }

      /* Often blocked without a tap — fallback button below */
      if (!tryPopup()) {
        hint.textContent = 'Tap once to continue.';
        btn.hidden = false;
        btn.addEventListener('click', function () {
          if (done) return;
          if (!tryPopup())
            hint.innerHTML = 'Popup still blocked. Open in a browser that allows this site to open a small window.';
        });
      }
    })();
  </script>
</body>
</html>
